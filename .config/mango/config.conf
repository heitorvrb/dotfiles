# Master-Stack Layout Setting
new_is_master=0
smartgaps=0

# Dwindle settings
dwindle_split_ratio=0.618

# Scroller settings
scroller_structs=10
edge_scroller_pointer_focus=0
scroller_default_proportion=0.5
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1
scroller_proportion_preset=1.0,0.75,0.5,0.249
bind=SUPER,t,switch_proportion_preset
bind=SUPER,c,centerwin
bind=CTRL+SHIFT,Left,scroller_stack,left
bind=CTRL+SHIFT,Right,scroller_stack,right
bind=CTRL+SHIFT,Up,scroller_stack,up
bind=CTRL+SHIFT,Down,scroller_stack,down

# Monocle settings
tab_bar_height=0

# Misc
idleinhibit_ignore_visible=0
cursor_hide_timeout=2
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
numlockon=1
xkb_rules_layout=br

# Appearance
borderpx=3
gappih=5
gappiv=5
gappoh=10
gappov=10

# circle of layouts
# all layouts: tile,scroller,monocle,grid,deck,center_tile,vertical_tile,right_tile,vertical_scroller,vertical_grid,vertical_deck,dwindle,fair,vertical_fair.
circle_layout=fair,scroller,center_tile

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,r,reload_config

# menus, file manager, terminal
bind=SUPER,e,spawn,dolphin
bind=SUPER,y,spawn,noctalia msg panel-toggle launcher
bind=SUPER,h,spawn,noctalia msg panel-toggle clipboard
bind=SUPER,v,spawn,noctalia msg panel-toggle control-center notifications
bind=SUPER+SHIFT,e,spawn,noctalia msg settings-toggle
bind=SUPER,b,spawn,noctalia msg bar-toggle
#bind=SUPER,Escape,spawn,noctalia msg panel-toggle session

bind=SUPER,r,spawn,footclient

# exit
bind=SUPER+SHIFT,q,quit
bind=SUPER,q,killclient

# mouse: wl-kbptr
bind=NONE,Pause,spawn,wl-kbptr

# screen capture
bind=NONE,Print,spawn,noctalia msg screenshot-region

# switch window focus
bind=SUPER,End,focusstack,next
bind=SUPER,Home,focusstack,previous
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,F6,togglejump,
bind=SUPER,a,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# switch layout
#bind=SUPER,n,switch_layout
bind=SUPER,n,spawn,$HOME/.config/mango/scripts/switch-layout.sh

# tag switch
#bind=SUPER+SHIFT,Left,viewtoleft,0
#bind=SUPER+SHIFT,Right,viewtoright,0
#bind=CTRL,Left,viewtoleft_have_client,0
#bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER+CTRL,Left,tagtoleft,0
bind=SUPER+CTRL,Right,tagtoright,0

# view tag; if the tag is empty, launch its default program (see scripts/tag-view.sh)
bind=SUPER,1,spawn,$HOME/.config/mango/scripts/tag-view.sh 1
bind=SUPER,2,spawn,$HOME/.config/mango/scripts/tag-view.sh 2
bind=SUPER,3,spawn,$HOME/.config/mango/scripts/tag-view.sh 3
bind=SUPER,4,spawn,$HOME/.config/mango/scripts/tag-view.sh 4
bind=SUPER,5,spawn,$HOME/.config/mango/scripts/tag-view.sh 5
bind=SUPER,6,spawn,$HOME/.config/mango/scripts/tag-view.sh 6
bind=SUPER,7,spawn,$HOME/.config/mango/scripts/tag-view.sh 7
bind=SUPER,8,spawn,$HOME/.config/mango/scripts/tag-view.sh 8
bind=SUPER,9,spawn,$HOME/.config/mango/scripts/tag-view.sh 9

# fallback: if I want to go to an empty tag
bind=SUPER+CTRL,1,view,1,0
bind=SUPER+CTRL,2,view,2,0
bind=SUPER+CTRL,3,view,3,0
bind=SUPER+CTRL,4,view,4,0
bind=SUPER+CTRL,5,view,5,0
bind=SUPER+CTRL,6,view,6,0
bind=SUPER+CTRL,7,view,7,0
bind=SUPER+CTRL,8,view,8,0
bind=SUPER+CTRL,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tagsilent,1,0
bind=SUPER+SHIFT,2,tagsilent,2,0
bind=SUPER+SHIFT,3,tagsilent,3,0
bind=SUPER+SHIFT,4,tagsilent,4,0
bind=SUPER+SHIFT,5,tagsilent,5,0
bind=SUPER+SHIFT,6,tagsilent,6,0
bind=SUPER+SHIFT,7,tagsilent,7,0
bind=SUPER+SHIFT,8,tagsilent,8,0
bind=SUPER+SHIFT,9,tagsilent,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-40
bind=CTRL+ALT,Down,resizewin,+0,+40
bind=CTRL+ALT,Left,resizewin,-40,+0
bind=CTRL+ALT,Right,resizewin,+40,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

#window rules
#windowrule=focused_opacity:0.85,unfocused_opacity:0.85,appid:helium

#gnome-system-monitor
windowrule=isnamedscratchpad:1,width:0.35,height:1.0,isterm:1,appid:foot-sysmon
bind=SUPER+SHIFT,t,toggle_named_scratchpad,foot-sysmon,none,footclient --app-id foot-sysmon -e gnome-system-monitor

# Minecraft
windowrule=isfullscreen:1,appid:chrome-olbgjfhdmomcafmdkploaehppnnjlbfd-Default

# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn,noctalia msg volume-up 1
bind=NONE,XF86AudioLowerVolume,spawn,noctalia msg volume-down 1
bind=NONE,XF86AudioPlay,spawn,noctalia msg media toggle

source=~/.config/mango/animation.conf
source=~/.config/mango/noctalia.conf

# Env
env=QT_QPA_PLATFORMTHEME,qt6ct

# Autostart
exec-once=noctalia
exec=foot --server
exec=/usr/lib/hyprpolkitagent/hyprpolkitagent
exec=/usr/lib/xdg-desktop-portal
