[audio]
enable_sounds = true

[bar.default]
background_opacity = 0.4999999888241291
border = "primary"
border_width = 3.0
center = [ "media", "audio_visualizer" ]
end = [
    "weather",
    "tray",
    "notifications",
    "clipboard",
    "volume",
    "bluetooth",
    "brightness",
    "battery",
    "wallpaper",
    "clock"
]
margin_ends = 10
radius = 3
start = [ "taskbar" ]
thickness = 32

[battery.device."/org/freedesktop/UPower/devices/battery_hidpp_battery_0"]
warning_threshold = 28

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
background_opacity = 0.85999998077750206
reserve_space = false
show_dots = true

[location]
address = "Viçosa, Minas Gerais, Brasil"

[lockscreen]
enabled = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
force = true

[notification]
filter_order = [ "filter" ]

    [notification.filter.filter]
    allow_permanent = true
    enabled = true
    match = "hlayout"
    play_sound = false
    save_history = true
    show_toast = true

[plugin_settings."onez3r0/show-keys"]
evtest_device = "/dev/input/event4"

[plugin_settings."yogaeru/mango_layout"]
main_placement = "floating"
main_position = "center"

[plugins]
enabled = []

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

[shell]
lang = "en"
settings_show_advanced = true
show_location = false
time_format = "{:%-I:%M}"

    [shell.launcher]
    categories = false
    session_search = true

    [shell.panel]
    launcher_categories = false
    launcher_session_search = true
    transparency_mode = "glass"

    [shell.screenshot]
    directory = "~/Imagens/Screenshots"
    filename_pattern = "%F_%T"
    pipe_command = "satty --filename - --output-filename \"$HOME/Imagens/Screenshots/%F_%T.png\" --floating-hack --initial-tool arrow --disable-notifications --early-exit save"
    pipe_to_command = true

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "a"
    variant = "default"

    [[shell.session.actions]]
    action = "command"
    command = "dm-tool lock"
    enabled = true
    label = "Bloquear"
    shortcut = "a"
    variant = "primary"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "s"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = false
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "d"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "f"
    variant = "destructive"

[system.monitor]
cpu_poll_seconds = 1
memory_poll_seconds = 1
network_poll_seconds = 1

[templates.noctalia-papirus]
input_path = "~/.config/noctalia/templates/Noctalia-Papirus.sh"
output_path = "~/.cache/noctalia/Noctalia-Papirus-apply.sh"
post_hook = "bash ~/.cache/noctalia/Noctalia-Papirus-apply.sh"

[templates.nvim-base16]
input_path = "~/.config/nvim/lua/matugen-template.lua"
output_path = "~/.config/nvim/lua/matugen.lua"
post_hook = "pkill -SIGUSR1 nvim"

[theme]
builtin = "Gruvbox"
community_palette = "Lilac AMOLED"
custom_palette = "green-yellow"
source = "custom"
wallpaper_scheme = "dysfunctional"

    [theme.templates]
    builtin_ids = [ "alacritty", "btop", "foot", "gtk3", "gtk4", "ghostty", "kcolorscheme", "mango", "qt" ]
    community_ids = [ "neovim", "vscode", "papirus-icons", "telegram", "yazi", "zathura" ]

[wallpaper]
directory = "~/Imagens/Wallpapers"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/heitor/Imagens/Wallpapers/wallhaven-je9wow_1920x1080.png"

    [wallpaper.last]
    path = "/home/heitor/Imagens/Wallpapers/wallhaven-je9wow_1920x1080.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/heitor/Imagens/Wallpapers/wallhaven-je9wow_1920x1080.png"

    [[wallpaper.favorite]]
    path = "/home/heitor/Imagens/Wallpapers/lit-up-sky.png"
    theme_mode = "auto"

[widget.cat]
type = "noctalia/bongocat:cat"

[widget.cat_2]
input_device = "/dev/input/event2"
type = "noctalia/bongocat:cat"

[widget.clock]
format = "{:%-I:%M}"

[widget.cpu]
color = "outline"
display = "graph"
show_label = false

[widget.custom_button_2]
type = "custom_button"

[widget.media]
art_size = 22.0
hide_when_no_media = true
max_length = 800
title_scroll = "on_hover"

[widget.network_tx]
color = "#464646"
display = "text"

[widget.picker]
icon = "layout-grid"
type = "yogaeru/mango_layout:picker"

[widget.ram]
color = "surface_variant"
display = "text"
stat = "ram_pct"

[widget.ramswap]
color = "outline"
display = "text"
stat = "ram_pct"

[widget.spacer_2]
length = 38
type = "spacer"

[widget.sysmon]
color = "surface_variant"
display = "text"
stat = "swap_pct"

[widget.taskbar]
capsule_radius = 3
group_by_workspace = true
group_single_icon_per_app = true
inactive_opacity = 0.70000000000000007
scale = 1.05
show_active_indicator = false
workspace_label_placement = "inside"

[widget.temp]
color = "surface_variant"
display = "text"

[widget.weather]
show_condition = false

[widget.widget]
type = "atheeq-rhxn/mangowc-layout-switcher:widget"
